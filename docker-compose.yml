version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_gym_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym_tracker_api

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/code/app
      - ./workout.json:/code/workout.json
      - ./alembic.ini:/code/alembic.ini
      - ./alembic:/code/alembic
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # ──── SMTP Configuration (Email Delivery) ────
      # Uncomment and fill in to enable email delivery in production.
      # In development (ENV_STATE=development), emails are printed to console.
      # Gmail example: use an App Password from https://myaccount.google.com/apppasswords
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_USER=your-email@gmail.com
      # - SMTP_PASSWORD=your-app-password
      # - SMTP_USE_TLS=true
      # - SMTP_USE_SSL=false
      # - SENDER_EMAIL=noreply@gymdorian.com
      # - SENDER_NAME=Gym Dorian
    depends_on:
      - db

volumes:
  postgres_data:
