# Pytest Configuration for Gym Dorian API Tests

[tool:pytest]
# Specify test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = app/tests

# Output options
addopts = 
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Coverage report (requires pytest-cov)
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    # Strict markers - fail on unknown markers
    --strict-markers
    # Show warnings
    -W default
    # Colorful output
    --color=yes
    # Show durations of slowest tests
    --durations=10

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for API endpoints and database
    slow: Tests that take significant time to run
    smoke: Quick smoke tests for CI/CD pipelines

# Coverage options
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    # Standard pragma
    pragma: no cover
    # Don't complain about missing debug-only code
    def __repr__
    # Don't complain if tests don't hit defensive assertion code
    raise AssertionError
    raise NotImplementedError
    # Don't complain if non-runnable code isn't run
    if __name__ == .__main__.:
    # Don't complain about abstract methods
    @abstractmethod

[coverage:html]
directory = htmlcov
